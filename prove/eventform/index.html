
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Ticket Form</title>
  <link rel="icon" href="icons/favicon.ico">
  <link rel="stylesheet" href="styles/eventform.css" />
  <script src="scripts/eventform.js" defer></script>
</head>
<body>
    <main class="wrapper">
        <h1>Event Ticket</h1>

        <form id="etForm">
            <div class="field">
                <label for="firstName">First Name</label>
                <input id="firstName" name="firstName" type="text" required />
            </div>

            <div class="field">
                <label for="lastName">Last Name</label>
                <input id="lastName" name="lastName" type="text" required />
            </div>

            <div class="field full">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required />
            </div>

            <div class="field">
                <label for="pType">Type</label>
                <select
                    id="pType"
                    name="pType"
                    aria-controls="IDContainer, codeContainer"
                    required
                >
                    <option value="">Choose one</option>
                    <option value="student">Student</option>
                    <option value="guest">Guest</option>
                </select>
            </div>

            <div class="field">
                <label for="eventDate">Event Date</label>
                <input id="eventDate" name="eventDate" type="date" required />
            </div>

            <div id="codeContainer" class="field full" hidden>
                <label for="code" id="codeLabel"></label>
                <input id="code" name="code" type="text" />
            </div>

            <button class="full" type="submit">Create Ticket</button>
        </form>

        <section id="output" aria-live="polite"></section>
    </main>
</body>
</html>
